# Validated config — see /home/sumate/CLAUDE.md "Validated configuration".
# Do not change strategy/risk values without re-running the srbounce sweep.

paper: true

markets:
  ETHUSDT:
    exchange: binance
    symbol: ETH/USDT
    timeframe: 4h
    mode: trade          # opens real/paper positions
  BTCUSDT:
    exchange: binance
    symbol: BTC/USDT
    timeframe: 4h
    mode: signal_only     # detect + notify only, never opens trades

strategy:
  swing_lookback: 4
  zone_atr_mult: 0.3
  min_touches: 3
  zone_max_age_bars: 500
  confirm_patterns: [pin, engulfing]
  sl_atr_mult: 0.5
  rr_target: 2.0
  time_exit_bars: 40
  trend_filter: ema200    # validated 2026-07-24 sweep: IS PF 1.65 / OOS 1.76 (~2 trades/mo)
                          # the null ("both sides") variant backtests IS 0.95 / OOS 1.53 — do not use

risk:
  risk_pct: 11              # half-Kelly (full Kelly ≈ 22% from the 2026-07 sweep's
                            # 146-trade R distribution). Paired with the bank-profit
                            # scheme: pot is capped at initial_equity, profits above
                            # the cap move to `banked` and are never risked again.
  initial_equity: 1000
  fee_pct: 0.1
  slippage_pct: 0.02
  daily_loss_limit_pct: 12  # one full SL loss (11%) trips it — blocks further
                            # entries the same UTC day, open trades still managed

data:
  history_bars: 800       # candles fetched each wake to seed ATR + zones
  poll_after_close_sec: 20 # wait this long after a 4H boundary before fetching

db:
  path: data/livesignal.db
